<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PyChat</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3e;
    --accent:#6c8fff; --accent2:#a78bfa; --text:#e2e4f0;
    --muted:#6b7280; --sys:#4ade80; --danger:#f87171;
    --mine-bg:#1e2a4a; --their-bg:#1e2030;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  #join-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .join-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:380px;display:flex;flex-direction:column;gap:1.25rem}
  .logo{font-family:monospace;font-size:1.6rem;font-weight:700} .logo span{color:var(--accent)}
  .join-card p{color:var(--muted);font-size:.875rem;line-height:1.5}
  .field label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase}
  .field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;padding:.65rem .85rem;outline:none}
  .field input:focus{border-color:var(--accent)}
  .btn-join{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.75rem;font-size:.95rem;font-weight:600;cursor:pointer}
  #join-error{color:var(--danger);font-size:.85rem;display:none}
  #chat-app{flex:1;display:none;flex-direction:column;overflow:hidden}
  .chat-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;border-bottom:1px solid var(--border)}
  .chat-header .logo{font-size:1.1rem}
  #conn-badge{font-size:.75rem;padding:.2rem .6rem;border-radius:99px;font-weight:600;background:#1a3a2a;color:var(--sys);border:1px solid #2a5a3a}
  #conn-badge.offline{background:#3a1a1a;color:var(--danger);border-color:#5a2a2a}
  .chat-body{flex:1;display:flex;overflow:hidden}
  .sidebar{width:180px;border-right:1px solid var(--border);display:flex;flex-direction:column}
  .sidebar-title{font-size:.7rem;text-transform:uppercase;color:var(--muted);padding:.85rem 1rem .5rem}
  #user-list{flex:1;overflow-y:auto;padding:0 .5rem .5rem;list-style:none;display:flex;flex-direction:column;gap:2px}
  #user-list li{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;border-radius:6px;font-size:.875rem;color:var(--muted)}
  #user-list li.me{color:var(--accent);font-weight:600}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--sys);flex-shrink:0}
  .messages-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem;scroll-behavior:smooth}
  .msg{display:flex;gap:.6rem;max-width:75%}
  .msg.mine{align-self:flex-end;flex-direction:row-reverse}
  .msg.theirs{align-self:flex-start}
  .avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:2px}
  .bubble{padding:.55rem .85rem;border-radius:10px;font-size:.9rem;line-height:1.5;word-break:break-word}
  .msg.mine .bubble{background:var(--mine-bg);border:1px solid #2c3e6e}
  .msg.theirs .bubble{background:var(--their-bg);border:1px solid var(--border)}
  .bubble .meta{font-size:.7rem;color:var(--muted);margin-bottom:.2rem}
  .msg.mine .bubble .meta{text-align:right}
  .sys-msg{align-self:center;font-size:.75rem;color:var(--muted);padding:.2rem .8rem;border-radius:99px;background:var(--surface);border:1px solid var(--border)}
  #typing-indicator{min-height:1.4rem;padding:0 1rem;font-size:.78rem;color:var(--accent2);font-style:italic}
  .input-bar{display:flex;gap:.6rem;padding:.75rem 1rem;border-top:1px solid var(--border);align-items:flex-end}
  #msg-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.925rem;padding:.6rem .85rem;resize:none;max-height:120px;outline:none;font-family:inherit;line-height:1.5}
  #msg-input:focus{border-color:var(--accent)}
  .btn-send{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.6rem 1.1rem;font-size:.9rem;font-weight:600;cursor:pointer}
  @media(max-width:520px){.sidebar{display:none}}
</style>
</head>
<body>

<div id="join-screen">
  <div class="join-card">
    <div class="logo">Py<span>Chat</span></div>
    <p>Start the Python server, then enter a username to join.</p>
    <div class="field"><label>Server URL</label><input id="server-url" value="ws://localhost:8765"/></div>
    <div class="field"><label>Username</label><input id="username-input" placeholder="e.g. alice" maxlength="20" autocomplete="off"/></div>
    <span id="join-error"></span>
    <button class="btn-join" onclick="joinChat()">Join chat →</button>
  </div>
</div>

<div id="chat-app">
  <header class="chat-header">
    <div class="logo">Py<span>Chat</span></div>
    <span id="conn-badge">● connected</span>
  </header>
  <div class="chat-body">
    <nav class="sidebar">
      <div class="sidebar-title">Online</div>
      <ul id="user-list"></ul>
    </nav>
    <div class="messages-col">
      <div id="messages"></div>
      <div id="typing-indicator"></div>
      <div class="input-bar">
        <textarea id="msg-input" rows="1" placeholder="Type a message…"
          oninput="autoResize(this);sendTyping(true)"
          onkeydown="handleKey(event)"></textarea>
        <button class="btn-send" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
let ws=null,myName="",typingTimer=null;
const typingUsers=new Set();
const colors=["#6c8fff","#a78bfa","#34d399","#f59e0b","#f87171","#38bdf8","#fb7185","#4ade80"];
function colorFor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))>>>0;return colors[h%colors.length]}
function initials(n){return n.slice(0,2).toUpperCase()}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function joinChat(){
  const url=document.getElementById("server-url").value.trim();
  const name=document.getElementById("username-input").value.trim();
  if(!name){showErr("Enter a username.");return}
  try{ws=new WebSocket(url)}catch{showErr("Invalid URL.");return}
  ws.onopen=()=>ws.send(JSON.stringify({type:"join",username:name}));
  ws.onerror=()=>{showErr("Could not connect. Is the server running?")}
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==="welcome"){
      myName=msg.username;
      document.getElementById("join-screen").style.display="none";
      document.getElementById("chat-app").style.display="flex";
      updateUsers(msg.users);
      msg.history.forEach(renderMsg);
      scrollBottom();
    } else handleMsg(msg);
  };
  ws.onclose=()=>{setBadge(false);appendSys("⚠ Disconnected.")}
}

function showErr(m){const e=document.getElementById("join-error");e.textContent=m;e.style.display="block"}
function handleMsg(msg){
  if(msg.type==="message"||msg.type==="system"){renderMsg(msg);scrollBottom()}
  else if(msg.type==="typing"){msg.typing?typingUsers.add(msg.username):typingUsers.delete(msg.username);renderTyping()}
}
function renderMsg(msg){
  const box=document.getElementById("messages");
  if(msg.type==="system"){
    const el=document.createElement("div");el.className="sys-msg";el.textContent=msg.text;box.appendChild(el);
    updateUsers(msg.users);return;
  }
  const isMine=msg.username===myName;
  const wrap=document.createElement("div");wrap.className=`msg ${isMine?"mine":"theirs"}`;
  const av=document.createElement("div");av.className="avatar";av.textContent=initials(msg.username);av.style.background=colorFor(msg.username);
  const bubble=document.createElement("div");bubble.className="bubble";
  bubble.innerHTML=`<div class="meta">${isMine?"":esc(msg.username)+" · "}${msg.ts}</div><div style="white-space:pre-wrap">${esc(msg.text)}</div>`;
  wrap.appendChild(av);wrap.appendChild(bubble);box.appendChild(wrap);
}
function appendSys(t){const box=document.getElementById("messages");const el=document.createElement("div");el.className="sys-msg";el.textContent=t;box.appendChild(el);scrollBottom()}
function sendMessage(){
  const inp=document.getElementById("msg-input");const text=inp.value.trim();
  if(!text||!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type:"message",text}));inp.value="";autoResize(inp);sendTyping(false);
}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}}
function sendTyping(t){
  if(!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type:"typing",typing:t}));
  if(t){clearTimeout(typingTimer);typingTimer=setTimeout(()=>sendTyping(false),2500)}
}
function renderTyping(){
  const el=document.getElementById("typing-indicator");
  const others=[...typingUsers].filter(u=>u!==myName);
  el.textContent=others.length?others.slice(0,3).join(", ")+(others.length===1?" is typing…":" are typing…"):"";
}
function updateUsers(users){
  const ul=document.getElementById("user-list");ul.innerHTML="";
  (users||[]).forEach(n=>{const li=document.createElement("li");if(n===myName)li.className="me";li.innerHTML=`<span class="dot" style="background:${colorFor(n)}"></span>${esc(n)}${n===myName?" (you)":""}`;ul.appendChild(li)});
}
function setBadge(on){const b=document.getElementById("conn-badge");b.textContent=on?"● connected":"● disconnected";b.className=on?"":"offline"}
function scrollBottom(){const b=document.getElementById("messages");b.scrollTop=b.scrollHeight}
function autoResize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,120)+"px"}

document.getElementById("username-input").focus();
document.getElementById("username-input").addEventListener("keydown",e=>e.key==="Enter"&&joinChat());
</script>
</body>
</html>
